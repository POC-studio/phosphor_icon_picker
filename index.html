<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bubble Plugin Sandbox</title>
    <!-- Import de jQuery (requis par l'API Bubble) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Import de Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Sidebar Gauche : Contrôles -->
      <aside class="sidebar left-sidebar">
        <header style="display: flex; flex-direction: column; gap: 8px;">
          <select id="plugin-selector">
            <option value="phosphor-icon-picker">Phosphor Icon Picker</option>
            <option value="lucide-icon-picker">Lucide Icon Picker</option>
            <option value="emoji-picker">Emoji Picker</option>
            <option value="avatar">Avatar</option>
          </select>
          <select id="element-selector">
            <option value="icon-picker">Icon Picker</option>
            <option value="icon-viewer">Icon Viewer</option>
          </select>
        </header>

        <section class="control-section">
          <h3>Bubble Layout (Size)</h3>
          <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 8px;">
            <label style="font-size: 12px; display: flex; align-items: center; gap: 4px;">
              W: <input type="number" id="canvas-width-input" value="32" style="width: 50px; padding: 4px; border: 1px solid #ccc; border-radius: 4px;">
            </label>
            <label style="font-size: 12px; display: flex; align-items: center; gap: 4px;">
              H: <input type="number" id="canvas-height-input" value="32" style="width: 50px; padding: 4px; border: 1px solid #ccc; border-radius: 4px;">
            </label>
          </div>
          <p style="font-size: 10px; color: #666; margin: 0;">Simulates Native Bubble Width/Height</p>
        </section>

        <section class="control-section">
          <h3>Input Emulator</h3>
          <div id="input-emulator">
            <!-- Champs générés à partir du config.json -->
            <p class="empty-state">No properties defined yet.</p>
          </div>
        </section>

        <section class="control-section">
          <h3>State Monitor</h3>
          <div id="state-monitor">
            <!-- Liste des états publiés via publishState -->
            <p class="empty-state">No states published yet.</p>
          </div>
        </section>

        <section class="control-section">
          <h3>Event Log</h3>
          <ul id="event-log">
            <!-- Liste des événements déclenchés via triggerEvent -->
          </ul>
        </section>

        <section class="control-section" id="plugin-actions-section" style="display: none;">
          <h3>Plugin Actions</h3>
          <div id="plugin-actions">
            <!-- Boutons d'actions générés dynamiquement -->
          </div>
        </section>
      </aside>

      <!-- Zone Centrale : Rendu (Canvas) -->
      <main class="canvas-area">
        <div class="canvas-header">
          <h2>Canvas Preview</h2>
          <div class="canvas-modes">
            <label><input type="radio" name="preview-mode" value="preview"> Editor Mode (Preview)</label>
            <label><input type="radio" name="preview-mode" value="run" checked> Run Mode (Init/Update)</label>
          </div>
        </div>
        <div id="canvas-wrapper" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background-color: #f3f4f6;">
          <div id="canvas-container" style="background-color: white; border: 1px dashed #ccc; box-sizing: border-box; position: relative;">
            <!-- Le plugin sera injecté ici -->
          </div>
        </div>
      </main>

      <!-- Sidebar Droite : Code source et export -->
      <aside class="sidebar right-sidebar">
        <header>
          <h2>Export Code</h2>
        </header>
        <div id="code-exports">
          <!-- Contenu généré dynamiquement -->
        </div>
      </aside>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
